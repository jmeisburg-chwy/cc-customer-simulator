AWSTemplateFormatVersion: '2010-09-09'
Description: Customer Simulator Backend

Parameters:
  OpenAIApiKey:
    Type: String
    NoEcho: true
    Description: Enter your OpenAI API Key

Resources:
  SimulatorRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: SimulatorPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: "*"
              - Effect: Allow
                Action:
                  - dynamodb:PutItem
                Resource: "*"

  SimulatorLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: cc-customer-simulator
      Runtime: nodejs24.x
      Handler: index.handler
      Role: !GetAtt SimulatorRole.Arn
      Timeout: 30
      Code:
        S3Bucket: customer-simulator-deploy
        S3Key: customer-simulator-lambda.zip
      Environment:
        Variables:
          OPENAI_API_KEY: !Ref OpenAIApiKey
          COACHING_TABLE: RoleplayCoaching

  Api:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: customer-simulator-api
      ProtocolType: HTTP

  Integration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref Api
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${SimulatorLambda.Arn}/invocations
      PayloadFormatVersion: "2.0"

  Route:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref Api
      RouteKey: "$default"
      Target: !Sub integrations/${Integration}

  Stage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref Api
      StageName: "$default"
      AutoDeploy: true

  Permission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref SimulatorLambda
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com

Outputs:
  ApiUrl:
    Value: !Sub https://${Api}.execute-api.${AWS::Region}.amazonaws.com